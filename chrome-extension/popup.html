<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InmoGen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px;
      background: #111827;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }

    .header {
      background: #1f2937;
      padding: 14px 16px;
      border-bottom: 1px solid #374151;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: #facc15;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 900;
      color: #111827;
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }
    .header-text p {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 1px;
    }

    .content { padding: 16px; }

    .url-preview {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
    }
    .url-label {
      font-size: 10px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .url-text {
      font-size: 11px;
      color: #d1d5db;
      word-break: break-all;
      line-height: 1.4;
      max-height: 48px;
      overflow: hidden;
    }

    .portal-badge {
      display: inline-block;
      background: #facc15;
      color: #111827;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 999px;
      margin-bottom: 10px;
    }
    .portal-badge.unsupported {
      background: #374151;
      color: #9ca3af;
    }

    .btn-primary {
      width: 100%;
      padding: 11px;
      background: #facc15;
      color: #111827;
      font-size: 13px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #fde047; }
    .btn-primary:disabled {
      background: #374151;
      color: #6b7280;
      cursor: not-allowed;
    }

    .btn-secondary {
      width: 100%;
      margin-top: 8px;
      padding: 9px;
      background: transparent;
      color: #9ca3af;
      font-size: 12px;
      border: 1px solid #374151;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-secondary:hover {
      border-color: #6b7280;
      color: #d1d5db;
    }

    .not-listing {
      text-align: center;
      padding: 20px 0 6px;
    }
    .not-listing .icon { font-size: 28px; margin-bottom: 8px; }
    .not-listing p {
      font-size: 12px;
      color: #6b7280;
      line-height: 1.5;
    }

    .footer {
      padding: 10px 16px;
      border-top: 1px solid #1f2937;
      text-align: center;
      font-size: 10px;
      color: #4b5563;
    }
    .footer a { color: #facc15; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">IG</div>
    <div class="header-text">
      <h1>InmoGen</h1>
      <p>Creativos de Meta Ads con IA</p>
    </div>
  </div>

  <div class="content" id="content">
    <div style="text-align:center;padding:20px 0;color:#6b7280;font-size:12px;">
      Cargando...
    </div>
  </div>

  <div class="footer">
    <a href="https://inmogen-ia.com" target="_blank">inmogen-ia.com</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
